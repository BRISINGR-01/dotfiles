$browser = brave
$editor = code
$terminal = ghostty
$fileManager = nautilus
$mod = SUPER
$HOME = /home/alex
$dots = /home/alex/dotfiles
$scripts = $dots/scripts

source=./binds.conf 
source=./plugins.conf 

exec-once = /usr/lib/hyprpolkitagent
exec-once = udiskie
exec-once = swaync -s $dots/config/swaync.css -c $dots/config/swaync.json
exec-once = hyprsunset
exec-once = waybar
exec-once = hypridle -c $HOME/.config/hypr/hypridle.conf
exec-once = wl-paste --watch cliphist store
exec-once = $scripts/set-wallpaper
exec-once = $HOME/Desktop/VSC/ryanair/scrape.sh
exec-once = $browser
exec-once = hyprctl setcursor "a" 18

env = HYPRCURSOR_THEME,a
# env = HYPRCURSOR_THEME,catppuccin-mocha-custom-cursors
env = HYPRCURSOR_SIZE,18

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 1

    col.active_border = rgba(33ccffee) rgba(002effed) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    # layout = hy3
}

decoration {
    rounding = 10

    active_opacity = 1
    inactive_opacity = 0.9
    dim_inactive = true
    dim_strength = 0.1

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = windowsIn, 1, 1, easeInOutCubic, popin
    animation = windowsOut, 1, 0.5, easeInOutCubic, popin
    animation = windowsMove, 1, 2, easeInOutCubic, popin
    animation = border, 1, 1, easeOutQuint
    animation = workspaces, 1, 1, easeInOutCubic, slidefade
    animation = specialWorkspaceIn, 1, 0.8, easeOutQuint, slidefadevert
    animation = specialWorkspaceOut, 1, 1.5, easeInOutCubic, fade 
}

# Helps with pixalating
xwayland {
    enabled = true
    force_zero_scaling = true
}

misc {
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
}

input {
    kb_layout = us,bg
    kb_variant = ,phonetic,phonetic
    kb_options = grp:win_space_toggle

    follow_mouse = 1
    numlock_by_default = true
    sensitivity = 0
    touchpad {
        natural_scroll = true
        drag_lock  = false
    }
}

gesture = 3, horizontal, workspace

windowrule = match:class "org.gnome.Nautilus", size 80% 80%
windowrule = match:class "org.gnome.Nautilus" opacity 0.95
windowrule = match:title "Open Files?" size 80% 80%
windowrule = match:title (Open Files?) opacity 0.95
windowrule = match:title (Open Folder) size 80% 80%
windowrule = match:title (Open Folder) opacity 0.95
windowrule = match:class (electron) size 80% 80%
windowrule = match:class (electron) opacity 0.9
windowrule = match:class (xdg-desktop-portal-gtk) size 80% 80%
windowrule = match:class (xdg-desktop-portal-gtk) opacity 0.9
windowrule = match:class (blueman-manager-wrapped) size 50% 50%
windowrule = match:class (blueman-manager-wrapped) opacity 0.9
windowrule = match:class (nm-connection-editor) size 50% 50%
windowrule = match:class (nm-connection-editor) opacity 0.9
windowrule = match:class (pavucontrol) size 80% 80%
windowrule = match:class (pavucontrol) opacity 0.9
windowrule = match:title (.*olkit.*) maximize
windowrule = match:title (.*olkit.*) opacity 0.9
windowrule = match:title (swayimg) maximize
windowrule = match:class (org.pwmt.zathura) maximize

# monitor = , preferred, auto, 1
# monitor = eDP-1, preferred, auto, 1.333333
monitor = HDMI-A-1, 1440x900, auto-right, 1

windowrule = match:class (.*) float
windowrule = match:class (com\.mitchellh\.ghostty) tile
windowrule = match:class (firefox) tile
windowrule = match:class (google-chrome) tile
windowrule = match:class (brave-browser) tile
windowrule = match:class (obsidian) tile
windowrule = match:title (.* \- Visual Studio Code) float
windowrule = match:title (Visual Studio Code) float
windowrule = match:class (BeeperTexts) tile
windowrule = match:class (libre.*) tile

# # Ignore maximize requests from apps.
